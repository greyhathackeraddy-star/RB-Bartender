<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 30px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(15px);
}

.logo{
font-size:28px;
font-weight:bold;
color:#fbbf24;
}

.nav-links{
display:flex;
gap:15px;
}

.nav-links a{
text-decoration:none;
color:white;
padding:10px 18px;
border-radius:10px;
background:rgba(255,255,255,.08);
}

.container{
max-width:800px;
margin:auto;
padding:50px 20px;
}

.card{
background:rgba(255,255,255,.08);
padding:40px;
border-radius:20px;
backdrop-filter:blur(15px);
}

h1{
color:#fbbf24;
margin-bottom:20px;
}

input,textarea{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:10px;
background:rgba(255,255,255,.1);
color:white;
}

button{
margin-top:20px;
padding:15px 25px;
border:none;
border-radius:10px;
background:#fbbf24;
font-weight:bold;
cursor:pointer;
}

.info{
margin-top:30px;
line-height:2;
color:#cbd5e1;
}
</style>
</head>
<body>

<nav>
<div class="logo">RB Bar</div>

<div class="nav-links">
<a href="index.html">Home</a>
<a href="about.html">About</a>
</div>
</nav>

<div class="container">

<div class="card">

<h1>Contact Me</h1>

<form>
<input type="text" placeholder="Your Name">

<input type="email" placeholder="Your Email">

<textarea rows="5" placeholder="Your Message"></textarea>

<button type="submit">Send Message</button>
</form>

<div class="info">
📧 yourmail@example.com<br>
📱 +91 XXXXXXXXXX<br>
📍 India
</div>

</div>

</div>

</body>
</html>
